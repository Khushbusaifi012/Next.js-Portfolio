# `base` = app folder. `publish` must be path *inside* base (not `site/.next` or
# Netlify resolves to /repo/site/site/.next). Use `.next` only.

[build]
  base = "site"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
