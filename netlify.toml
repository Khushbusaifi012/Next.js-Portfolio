# Monorepo: `base` = app folder. `publish` must be a *different* path тАФ use repo-relative
# `site/.next` so Netlify never resolves publish === base (both /repo/site).

[build]
  base = "site"
  command = "npm run build"
  publish = "site/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
